name: DoughStatsEnd
version: 5.0.0
main: win.doughmination.statsend.StatsMain
api-version: 1.21.11
author: Doughmination
description: Simple Ender stats plugin
website: https://modding.doughmination.co.uk

commands:
  estart:
    description: Start the dragon event
    usage: /<command>
    permission: statsend.admin
    permission-message: You don't have permission to use this command!
  estop:
    description: Stop and reset the dragon event
    usage: /<command>
    permission: statsend.admin
    permission-message: You don't have permission to use this command!

permissions:
  statsend.admin:
    description: Admin permissions for dragon event
    default: op
  statsend.participate:
    description: Permission to participate in dragon events
    default: true