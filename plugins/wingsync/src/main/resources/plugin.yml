# WingSync

name: WingSync
version: '3.2.0'
main: win.doughmination.wingsync.Main
api-version: '1.21.10'
depend: [DoughminationAPI]
author: Doughmination
website: https://modding.doughmination.co.uk

commands:
  wsreload:
    description: Reload WingSync config and reconnect the Discord bot
    usage: /wsreload
    permission: wingsync.reload

permissions:
  wingsync.reload:
    description: Allows reloading the WingSync plugin
    default: op