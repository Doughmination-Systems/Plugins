name: Plural
main: win.doughmination.plural.PluralMain
version: 5.2.0
api-version: 1.21.11
author: Doughmination
website: https://modding.doughmination.win
description: "Cloud-backed plural system proxy for Plural Cloud."
softdepend: [LuckPerms]

commands:
  plural:
    description: "Plural Cloud commands"
    usage: "/plural <system|help>"
    permission: plural.use
    aliases: [pl]

permissions:
  plural.use:
    description: "Use Plural Cloud commands"
    default: true