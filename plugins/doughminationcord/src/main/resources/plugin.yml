name: Doughminationcord
version: 5.0.0
main: win.dougmination.doughminationcord.CordMain
api-version: '1.21'
depend: [DoughminationAPI]
author: Doughmination
website: "https://modding.doughmination.co.uk"

# Commands
commands:
  # Ban commands
  ecban:
    description: Ban a player from the server
    usage: /ban <player> [reason]
    permission: dough.ban
    permission-message: §cYou do not have permission to ban players!
  unban:
    description: Unban a player from the server
    usage: /unban <player>
    permission: dough.unban
    permission-message: §cYou do not have permission to unban players!
  banlist:
    description: View all banned players
    usage: /banlist
    permission: dough.banlist
    permission-message: §cYou do not have permission to view the ban list!

  # Existing commands
  recipes:
    description: Get the URL to view all spawn egg recipes
    usage: /recipes
    permission: dough.recipes
    permission-message: §cYou don't have permission to use this command!
  version:
    description: Display the plugin version and credits.
  setspawn:
    description: Set the spawn location
    permission: dough.setspawn
  spawn:
    description: Teleport to the spawn location
  doughreload:
    description: Reload the estrocord plugin configuration
    usage: /doughreload
    permission: dough.reload
    permission-message: §cYou do not have permission to reload this plugin!
  tpask:
    description: Ask to tp to another player
    usage: /tpask <player>
    permission: estrocord.tpask
    permission-message: §cYou don't have permission to use this command!
  tpaccept:
    description: Accept a tp request
    usage: /tpaccept
    permission: estrocord.tpaccept
    permission-message: §cYou don't have permission to use this command!
  tpdeny:
    description: Deny a tp request
    usage: /tpdeny
    permission: estrocord.tpdeny
    permission-message: §cYou don't have permission to use this command!
  playtime:
    description: Check your total playtime on the server.
    usage: /playtime
    permission: estrocord.playtime
    permission-message: §cYou don't have permission to use this command!
  dough:
    description: Show help information for Doughminationcord commands
    usage: /dough <page>
    permission: dough.use
    aliases: [ ec ]
  setbase:
    description: Set your base location
    usage: /setbase
  base:
    description: Teleport to your saved base location
    usage: /base
  visitbase:
    description: Teleport to another player's base location
    usage: /visitbase <player>
    permission: dough.visitbase
    permission-message: §cYou don't have permission to use this command!
  kiss:
    description: Kiss another player
    usage: /kiss <player>
    permission: dough.kiss
    permission-message: §cYou don't have permission to use this command!
  kitty:
    description: Send a cute kitty message
    usage: /kitty
    permission: dough.kitty
    permission-message: §cYou don't have permission to use this command!
  veinminer:
    description: Toggle vein mining for ores or trees
    usage: /veinminer <ores|trees>
  basefly:
    description: Toggle flight within base radius
    usage: /basefly <on|off>
  flyzone:
    description: Create a communal flight zone
    usage: /flyzone <x1> <y1> <z1> <x2> <y2> <z2> <name>
    permission: dough.flyzone
  rmflyzone:
    description: Remove a communal flight zone
    usage: /rmflyzone <name>
    permission: dough.flyzone
  growthpotion:
    description: Gives you a growth potion
    usage: /growthpotion
    permission: dough.growthpotion
  shrinkpotion:
    description: Gives you a shrink potion
    usage: /shrinkpotion
    permission: dough.shrinkpotion

# Permissions
permissions:
  dough.ban:
    description: Allows banning players
    default: op
  dough.unban:
    description: Allows unbanning players
    default: op
  dough.banlist:
    description: Allows viewing the ban list
    default: op
  dough.reload:
    description: Allows reloading of the Doughminationcord plugin.
    default: op
  dough.visitbase:
    description: Allows players to teleport to other players' bases.
    default: op
  dough.setspawn:
    description: Allows players to set spawn.
    default: op
  dough.kiss:
    description: Allows players to use the kiss command.
    default: true
  dough.kitty:
    description: Allows players to use the kitty command.
    default: true
  dough.playtime:
    description: Allows players to check their playtime.
    default: true
  dough.tpask:
    description: Allows player to ask to tp to another player.
    default: true
  dough.tpaccept:
    description: Allows a player to accept a tp request.
    default: true
  dough.tpdeny:
    description: Allows a player to deny a tp request.
    default: true
  dough.use:
    description: Allows a player to see the help section.
    default: true
  dough.flyzone:
    description: Permission to manage communal fly zones
    default: op
  dough.growthpotion:
    description: Gives a growth potion
    default: op
  dough.shrinkpotion:
    description: Gives a shrink potion
    default: op
  dough.recipes:
    description: Allows players to view spawn egg recipes URL
    default: true