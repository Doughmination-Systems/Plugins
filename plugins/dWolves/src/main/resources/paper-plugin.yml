name: dWolves
version: 1.0.0
main: win.doughmination.dwolves.DWolvesPlugin
api-version: '1.21'
description: Wolf trust system — let trusted players manage your wolves.
authors: Doughmination

permissions:
  dwolves.trust:
    description: Allows a player to trust others with their wolves
    default: true
  dwolves.admin:
    description: Allows administrative override commands
    default: op